<!doctype html><html lang="pt-BR"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1"><title>LDB R3 — Controle de Múltiplas</title>
<style>
:root{color-scheme:dark;--bg:#0e131d;--card:#1a212e;--ink:#e7ecf3;--sub:#8b94a3;--line:#2a3344;--head:#0a0e16;--green:#2ed47f;--red:#ff6b6b;--blue:#5d9bff;--gold:#e6b53c;--greenbg:#16331f;--redbg:#331a1a}
*{box-sizing:border-box}body{margin:0;font-family:Arial,system-ui,sans-serif;background:var(--bg);color:var(--ink)}
header{position:sticky;top:0;background:var(--head);color:#fff;padding:12px 18px;z-index:10;box-shadow:0 2px 14px rgba(0,0,0,.55)}
header h1{margin:0 0 10px;font-size:17px}
.stats{display:flex;gap:10px;flex-wrap:wrap}
.tile{background:#141b27;border:1px solid #232c3c;border-radius:10px;padding:8px 12px;min-width:120px}
.tile .l{font-size:11px;color:#8b94a3;text-transform:uppercase;letter-spacing:.5px}
.tile .v{font-size:19px;font-weight:bold;margin-top:2px}
.tile input{width:90px;background:#0e131d;border:1px solid var(--line);color:#fff;border-radius:6px;padding:3px 6px;font-size:16px;font-weight:bold}
.tile.hl{border:2px solid var(--gold);background:#241f0e}.tile.hl .l{color:var(--gold);font-weight:bold}.tile.hl input{border:1px solid var(--gold);width:110px;font-size:20px;color:var(--gold)}
.pos{color:var(--green)}.neg{color:var(--red)}
.filters{padding:10px 18px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;background:#10161f;border-bottom:1px solid var(--line);position:sticky;top:96px;z-index:9}
.filters span{font-size:12px;color:var(--sub)}
.filters button,.filters select{border:1px solid var(--line);background:#1a212e;color:var(--ink);border-radius:8px;padding:6px 10px;cursor:pointer;font-size:13px}
.filters button.active{background:var(--blue);color:#0a0e16;border-color:var(--blue);font-weight:bold}
.filters button.gon{background:var(--green);color:#0a0e16;border-color:var(--green);font-weight:bold}
#gfilters{top:138px}
.wrap{padding:16px;max-width:940px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:14px;overflow:hidden}
.card.done{border-color:#3a4760}
.card.win{border-color:var(--green);box-shadow:0 0 0 2px rgba(46,212,127,.22)}
.card.loss{border-color:var(--red);box-shadow:0 0 0 2px rgba(255,107,107,.18);opacity:.92}
.chead{display:flex;align-items:center;gap:12px;padding:10px 14px;background:#222b3b;border-bottom:1px solid var(--line);flex-wrap:wrap}
.card.win .chead{background:var(--greenbg)}.card.loss .chead{background:var(--redbg)}
.bigchk{display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none}
.bigchk input{width:22px;height:22px;cursor:pointer;accent-color:var(--green)}
.bigchk span{font-weight:bold;font-size:12px;color:var(--green)}
.title{font-weight:bold;font-size:15px}
.cmeta{display:flex;gap:14px;font-size:14px;align-items:center}
.cmeta .ev{color:var(--green);font-weight:bold}
.resbtns{margin-left:auto;display:flex;gap:6px}
.resbtns button{border:1px solid var(--line);background:#1a212e;color:var(--sub);border-radius:7px;padding:5px 10px;cursor:pointer;font-size:12px;font-weight:bold}
.resbtns button.win{background:var(--green);color:#06210f;border-color:var(--green)}
.resbtns button.loss{background:var(--red);color:#2a0a0a;border-color:var(--red)}
.stakebar{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--line);font-size:14px;flex-wrap:wrap}
.stakebar input{width:120px;padding:7px 9px;border:1px solid var(--line);border-radius:8px;font-size:15px;background:#0e131d;color:var(--ink)}
.stakebar .sug{color:var(--gold);font-size:14px;font-weight:bold;cursor:pointer;text-decoration:underline;text-decoration-color:rgba(230,181,60,.45)}
.stakebar .pnl{margin-left:auto;font-weight:bold}
.legs{padding:6px 14px 12px}
.leg{display:flex;align-items:center;gap:10px;padding:6px 0;font-size:15px;border-bottom:1px dashed #232c3c}
.leg:last-child{border-bottom:0}
.leg input{width:18px;height:18px;cursor:pointer;accent-color:var(--blue)}
.leg .bet{flex:1}.leg.checked .bet{color:var(--sub);text-decoration:line-through}
.leg .odd{color:var(--blue);font-weight:bold}
.note{max-width:940px;margin:0 auto;padding:6px 18px 28px;color:var(--sub);font-size:12px}
@media (max-width:680px){
 header{position:static;padding:10px 12px}header h1{font-size:15px;margin-bottom:8px}
 .stats{gap:6px}.tile{min-width:0;flex:1 1 calc(33.3% - 6px);padding:6px 8px}.tile.hl{flex:1 1 100%}.tile.hl input{width:140px}
 .tile .l{font-size:10px}.tile .v{font-size:15px}.tile input{width:64px;font-size:14px}
 .filters{position:static;padding:8px 12px;gap:6px}.filters span{width:100%;margin-top:2px}
 .filters button,.filters select{padding:8px 11px;font-size:13px}
 .wrap{padding:10px}.card{margin-bottom:11px}
 .chead{padding:9px 11px;gap:8px}
 .chead .title{order:3;width:100%;font-size:14px}
 .cmeta{order:2;margin-left:auto}
 .resbtns{order:4;width:100%;margin-left:0}.resbtns button{flex:1;padding:9px}
 .stakebar{padding:9px 11px;font-size:13px}.stakebar input{width:100px}.stakebar .pnl{margin-left:0;width:100%}
 .leg{font-size:14px;gap:9px;padding:8px 0}.leg input{width:22px;height:22px}
 .bigchk input{width:24px;height:24px}
}
</style></head><body>
<header><h1>LDB Rodada 3 — Controle de Múltiplas</h1><div class="stats" id="stats"></div></header>
<div class="filters" id="filters">
<span>tam.:</span><button data-k="all" class="active">todas</button><button data-k="2">2</button><button data-k="3">3</button>
<span>status:</span><button data-s="all" class="active">todas</button><button data-s="pend">a fazer</button><button data-s="aberto">em aberto</button><button data-s="liq">liquidadas</button>
<span>ordenar:</span><select id="sort"><option value="k">tamanho</option><option value="ev">valor</option><option value="odd">odd</option><option value="stake">aposta</option></select>
<button id="export" style="margin-left:auto">⬇ backup</button><button id="reset" style="color:#ff6b6b">limpar</button></div>
<div class="filters" id="gfilters"><span>jogos:</span><button data-g="rio claro" class="gon">Rio Claro × Caxias</button><button data-g="mogi" class="gon">Mogi × Vasco/Tijuca</button><button data-g="pinheiros" class="gon">Pinheiros × Basquete Cearense</button><button data-gall="1" style="margin-left:auto">todos</button><button data-gnone="1">nenhum</button></div>
<div class="wrap" id="wrap"></div>
<div class="note">8 jogos FINAIS de hoje (13:30 em diante), odds ATUAIS das casas. Cada perna = onde nosso consenso diverge da linha da casa (valor). Total = sempre o do TJ. Auto-liquidação após os jogos (Fase 2). Salvo no navegador — use o backup.</div>
<script>
const DATA=[{"id": "9ae681e923199cf2", "n": 1, "k": 2, "odd": 3.35, "ev": 19.2, "stake_u": 1.0, "legs": [{"bet": "Mogi — Handicap −19.5", "odd": 1.83, "res": null, "g": "mogi"}, {"bet": "Basquete Cearense — Handicap +52.5", "odd": 1.83, "res": null, "g": "pinheiros"}]}, {"id": "05eb17fb7f082905", "n": 2, "k": 2, "odd": 3.35, "ev": 17.0, "stake_u": 0.9, "legs": [{"bet": "Rio Claro × Caxias — Mais de 133.5", "odd": 1.83, "res": null, "g": "rio claro"}, {"bet": "Basquete Cearense — Handicap +52.5", "odd": 1.83, "res": null, "g": "pinheiros"}]}, {"id": "024d615f78a7268e", "n": 3, "k": 2, "odd": 3.35, "ev": 10.9, "stake_u": 0.58, "legs": [{"bet": "Rio Claro × Caxias — Mais de 133.5", "odd": 1.83, "res": null, "g": "rio claro"}, {"bet": "Mogi — Handicap −19.5", "odd": 1.83, "res": null, "g": "mogi"}]}, {"id": "c7828742687b2f09", "n": 4, "k": 2, "odd": 3.35, "ev": 9.7, "stake_u": 0.51, "legs": [{"bet": "Mogi — Handicap −19.5", "odd": 1.83, "res": null, "g": "mogi"}, {"bet": "Pinheiros × Basquete Cearense — Menos de 149.5", "odd": 1.83, "res": null, "g": "pinheiros"}]}, {"id": "28ed8b25c3ac13b1", "n": 5, "k": 2, "odd": 3.35, "ev": 7.7, "stake_u": 0.41, "legs": [{"bet": "Rio Claro × Caxias — Mais de 133.5", "odd": 1.83, "res": null, "g": "rio claro"}, {"bet": "Pinheiros × Basquete Cearense — Menos de 149.5", "odd": 1.83, "res": null, "g": "pinheiros"}]}, {"id": "cf01f588a0fb38b0", "n": 6, "k": 3, "odd": 6.13, "ev": 24.4, "stake_u": 0.59, "legs": [{"bet": "Rio Claro × Caxias — Mais de 133.5", "odd": 1.83, "res": null, "g": "rio claro"}, {"bet": "Mogi — Handicap −19.5", "odd": 1.83, "res": null, "g": "mogi"}, {"bet": "Basquete Cearense — Handicap +52.5", "odd": 1.83, "res": null, "g": "pinheiros"}]}, {"id": "b4db27f6dd80583c", "n": 7, "k": 3, "odd": 6.13, "ev": 14.4, "stake_u": 0.35, "legs": [{"bet": "Rio Claro × Caxias — Mais de 133.5", "odd": 1.83, "res": null, "g": "rio claro"}, {"bet": "Mogi — Handicap −19.5", "odd": 1.83, "res": null, "g": "mogi"}, {"bet": "Pinheiros × Basquete Cearense — Menos de 149.5", "odd": 1.83, "res": null, "g": "pinheiros"}]}];const KEY="ldb_r3_real_v6";
let state=JSON.parse(localStorage.getItem(KEY)||"{}");
let fK="all",fS="all",fSort="k";
const GSET=["rio claro", "mogi", "pinheiros"];let fG=new Set(GSET);  // filtro de jogos: todos marcados por padrão
function S(id){if(!state[id])state[id]={done:false,stake:"",result:0,legs:{}};return state[id]}
function save(){localStorage.setItem(KEY,JSON.stringify(state));render()}
function brl(v){const n=Math.round(v);return (n<0?"-R$ ":"R$ ")+Math.abs(n).toLocaleString("pt-BR")}
// resultado efetivo da múltipla: override manual (result) tem prioridade; senão deriva das pernas (auto res)
function mres(m){const s=S(m.id);if(s.result)return s.result;
 let allwin=true,anyres=false;
 for(const l of m.legs){if(l.res===null||l.res===undefined){allwin=false}else{anyres=true;if(l.res<0)return -1}}
 return (anyres&&allwin)?1:0}
function pnl(m){const s=S(m.id);const st=parseFloat(s.stake)||0;if(!s.done||!st)return 0;const r=mres(m);
 return r>0?st*(m.odd-1):(r<0?-st:0)}
function stats(){
 let feitas=0,apost=0,aberto=0,lucro=0,liqAp=0,g=0,p=0;
 DATA.forEach(m=>{const s=state[m.id];if(!s||!s.done)return;feitas++;const st=parseFloat(s.stake)||0;apost+=st;
  const r=mres(m);if(r===0){aberto+=st}else{liqAp+=st;const pl=pnl(m);lucro+=pl;if(r>0)g++;else p++}});
 const banca0=parseFloat(state._banca)||2000;const unit=parseFloat(state._unit)||50;const roi=liqAp>0?100*lucro/liqAp:0;const acc=(g+p)>0?100*g/(g+p):0;
 const cl=v=>v>0?"pos":(v<0?"neg":"");
 document.getElementById("stats").innerHTML=
  `<div class="tile hl"><div class="l">⚡ SUA UNIDADE (R$)</div><div class="v"><input id="unit" type="number" value="${unit}"></div></div>`+
  `<div class="tile"><div class="l">Banca inicial</div><div class="v"><input id="banca" type="number" value="${banca0}"></div></div>`+
  `<div class="tile"><div class="l">Banca atual</div><div class="v ${cl(lucro)}">${brl(banca0+lucro)}</div></div>`+
  `<div class="tile"><div class="l">Lucro/Prejuízo</div><div class="v ${cl(lucro)}">${brl(lucro)}</div></div>`+
  `<div class="tile"><div class="l">ROI</div><div class="v ${cl(lucro)}">${roi>=0?'+':''}${roi.toFixed(0)}%</div></div>`+
  `<div class="tile"><div class="l">Apostado</div><div class="v">${brl(apost)}</div></div>`+
  `<div class="tile"><div class="l">Em aberto</div><div class="v" style="color:var(--gold)">${brl(aberto)}</div></div>`+
  `<div class="tile"><div class="l">Feitas</div><div class="v">${feitas}/${DATA.length}</div></div>`+
  `<div class="tile"><div class="l">Acerto</div><div class="v">${g}V · ${p}D${(g+p)?` · ${acc.toFixed(0)}%`:''}</div></div>`;
}
function sortKey(m){return {k:m.k,ev:m.ev,odd:m.odd,stake:parseFloat((state[m.id]||{}).stake)||0}[fSort]}
function render(){
 stats();const unit=parseFloat(state._unit)||50;const w=document.getElementById("wrap");w.innerHTML="";
 let list=DATA.slice().sort((a,b)=>fSort==="k"?(a.k-b.k||b.ev-a.ev):(sortKey(b)-sortKey(a)));
 list.forEach(m=>{
  const s=S(m.id);const r=mres(m);
  if(fK!=="all"&&String(m.k)!==fK)return;
  if(!m.legs.every(l=>fG.has(l.g)))return;  // só múltiplas formadas SÓ por jogos marcados
  if(fS==="pend"&&s.done)return;if(fS==="aberto"&&!(s.done&&r===0))return;if(fS==="liq"&&!(s.done&&r!==0))return;
  const st=parseFloat(s.stake)||0;const pl=pnl(m);
  const card=document.createElement("div");card.className="card"+(s.done?" done":"")+(s.done&&r>0?" win":"")+(s.done&&r<0?" loss":"");
  let legsHtml="";
  m.legs.forEach((l,i)=>{const ck=!!s.legs[i];const tag=l.res>0?' ✓':(l.res<0?' ✗':'');
   legsHtml+=`<label class="leg${ck?' checked':''}"><input type="checkbox" data-id="${m.id}" data-leg="${i}" ${ck?'checked':''}>`+
   `<span class="bet">${l.bet}${tag}</span><span class="odd">@ ${l.odd.toFixed(2)}</span></label>`});
  const resBtns=s.done?`<div class="resbtns"><button data-res="${m.id}" data-v="1" class="${r>0?'win':''}">✓ Ganhou</button>`+
   `<button data-res="${m.id}" data-v="-1" class="${r<0?'loss':''}">✗ Perdeu</button></div>`:'';
  card.innerHTML=
   `<div class="chead"><label class="bigchk"><input type="checkbox" data-done="${m.id}" ${s.done?'checked':''}><span>FEITA</span></label>`+
   `<span class="title">Múltipla #${m.n} · ${m.k} pernas</span>`+
   `<div class="cmeta"><span>odd <b>${m.odd.toFixed(2)}</b></span><span class="ev">+${m.ev}%</span></div>${resBtns}</div>`+
   `<div class="stakebar">Entrei: R$ <input type="number" min="0" step="1" placeholder="0" data-stake="${m.id}" value="${s.stake}">`+
   `<span class="sug" data-sug="${m.id}" data-u="${m.stake_u}">sugerido ${(''+m.stake_u).replace('.',',')}u ≈ R$ ${Math.round(m.stake_u*unit)}</span>`+
   `<span class="pnl ${pl>0?'pos':(pl<0?'neg':'')}">${st&&s.done?(r!==0?('resultado '+brl(pl)):('retorno se ganhar '+brl(st*m.odd))):''}</span></div>`+
   `<div class="legs">${legsHtml}</div>`;
  w.appendChild(card);
 });
}
document.addEventListener("change",e=>{const t=e.target;
 if(t.id==="banca"){state._banca=t.value;save()}
 else if(t.id==="unit"){state._unit=t.value;save()}
 else if(t.id==="sort"){fSort=t.value;render()}
 else if(t.dataset.done!==undefined){S(t.dataset.done).done=t.checked;save()}
 else if(t.dataset.leg!==undefined){S(t.dataset.id).legs[t.dataset.leg]=t.checked;save()}
 else if(t.dataset.stake!==undefined){S(t.dataset.stake).stake=t.value;save()}});
document.addEventListener("click",e=>{const t=e.target;
 if(t.dataset.res!==undefined){const s=S(t.dataset.res);const v=parseInt(t.dataset.v);s.result=(s.result===v?0:v);save()}
 else if(t.dataset.sug!==undefined){S(t.dataset.sug).stake=Math.round(parseFloat(t.dataset.u)*(parseFloat(state._unit)||50));save()}
 else if(t.dataset.k!==undefined){fK=t.dataset.k;document.querySelectorAll("[data-k]").forEach(b=>b.classList.toggle("active",b===t));render()}
 else if(t.dataset.s!==undefined){fS=t.dataset.s;document.querySelectorAll("[data-s]").forEach(b=>b.classList.toggle("active",b===t));render()}
 else if(t.dataset.g!==undefined){if(fG.has(t.dataset.g))fG.delete(t.dataset.g);else fG.add(t.dataset.g);t.classList.toggle("gon");render()}
 else if(t.dataset.gall!==undefined){fG=new Set(GSET);document.querySelectorAll("[data-g]").forEach(b=>b.classList.add("gon"));render()}
 else if(t.dataset.gnone!==undefined){fG.clear();document.querySelectorAll("[data-g]").forEach(b=>b.classList.remove("gon"));render()}
 else if(t.id==="export"){const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  const u=URL.createObjectURL(blob);const a=document.createElement("a");a.href=u;a.download="controle_multiplas_r3.json";a.click();URL.revokeObjectURL(u)}
 else if(t.id==="reset"){if(confirm("Apagar tudo?")){state={};save()}}});
render();
</script></body></html>
